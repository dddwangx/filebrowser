version: '3'

services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    volumes:
      - ./data:/srv
      - ./config:/config
      - ./database:/database
    environment:
      - FB_BASEURL=/filebrowser
    networks:
      - filebrowser-net

  nginx:
    image: nginx:alpine
    container_name: filebrowser-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx-filebrowser.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/public:/var/www/filebrowser
    depends_on:
      - filebrowser
    networks:
      - filebrowser-net

networks:
  filebrowser-net:
    driver: bridge
