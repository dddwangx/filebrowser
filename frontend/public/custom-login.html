<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="Filebrowser 登录">
    <meta name="theme-color" content="#667eea">

    <!-- 性能优化 -->
    <link rel="preconnect" href="https://yangzhi01.lilexer.top" crossorigin>
    <link rel="dns-prefetch" href="https://yangzhi01.lilexer.top">

    <!-- 预加载关键资源 -->
    <link rel="preload" as="image" href="/logos/logo_01.jpg">
    <link rel="preload" as="image" href="/logos/logo_02.jpg">

    <title>Filebrowser - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
            will-change: transform;
        }

        /* 彩色渐变背景 + 呼吸动画 */
        .animated-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg,
                #667eea 0%,
                #764ba2 25%,
                #f093fb 50%,
                #4facfe 75%,
                #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite, breathe 8s ease-in-out infinite;
            z-index: -1;
            will-change: background-position;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.9; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* 登录容器 */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            animation: slideIn 0.6s ease-out;
            will-change: transform;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo轮播 */
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            height: 120px;
            overflow: hidden;
        }

        .logo-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid transparent;
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(135deg, #667eea, #764ba2, #f093fb) border-box;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: logoFadeIn 1s ease-in-out;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            will-change: opacity, transform;
        }

        @keyframes logoFadeIn {
            0% { opacity: 0; transform: translateX(-50%) scale(0.8); }
            100% { opacity: 1; transform: translateX(-50%) scale(1); }
        }

        /* 标题 - 彩色渐变 + 加粗 */
        .title {
            text-align: center;
            margin-bottom: 30px;
        }

        .title h1 {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            animation: titlePulse 3s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }

        .title p {
            color: #666;
            font-size: 14px;
            font-weight: 600;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 700;
            font-size: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* 登录按钮 - 彩色渐变 */
        .login-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .login-button:active {
            transform: translateY(0);
        }

        /* 底部信息 */
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 12px;
            font-weight: 600;
        }

        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="animated-background"></div>
    
    <div class="login-container">
        <div class="login-box">
            <div class="logo-container">
                <img id="logo" class="logo-image" src="/logos/logo_01.jpg" alt="Logo">
            </div>
            
            <div class="title">
                <h1>Filebrowser</h1>
                <p>安全的文件管理系统</p>
            </div>
            
            <form id="loginForm">
                <div id="errorMessage" class="error-message" style="display: none; color: #e74c3c; margin-bottom: 15px; padding: 10px; background: #fadbd8; border-radius: 5px; text-align: center;"></div>

                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>

                <button type="submit" class="login-button">登录</button>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                </div>
            </form>
            
            <div class="footer">
                <p>© 2026 Filebrowser - Powered by Nature</p>
            </div>
        </div>
    </div>

    <script>
        // 性能优化：缓存DOM元素
        const logoElement = document.getElementById('logo');
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMessage');

        // Logo轮播功能 - 每5秒切换
        const logoImages = [
            '/logos/logo_01.jpg',
            '/logos/logo_02.jpg',
            '/logos/logo_03.jpg',
            '/logos/logo_04.jpg',
            '/logos/logo_05.jpg',
            '/logos/logo_06.jpg',
            '/logos/logo_07.jpg',
            '/logos/logo_08.jpg',
            '/logos/logo_09.jpg',
            '/logos/logo_10.jpg',
            '/logos/logo_11.jpg',
            '/logos/logo_12.jpg',
            '/logos/logo_13.jpg',
            '/logos/logo_14.jpg',
            '/logos/logo_15.jpg'
        ];

        let currentLogoIndex = 0;
        let logoChangeTimeout = null;

        function changeLogo() {
            currentLogoIndex = (currentLogoIndex + 1) % logoImages.length;

            // 使用requestAnimationFrame优化动画
            logoElement.style.animation = 'none';
            // 强制重排以重置动画
            void logoElement.offsetWidth;
            logoElement.src = logoImages[currentLogoIndex];
            logoElement.style.animation = 'logoFadeIn 1s ease-in-out';
        }

        // 使用requestIdleCallback延迟初始化logo轮播
        if ('requestIdleCallback' in window) {
            requestIdleCallback(() => {
                setInterval(changeLogo, 5000);
            });
        } else {
            setTimeout(() => {
                setInterval(changeLogo, 5000);
            }, 1000);
        }

        // 表单提交处理 - 优化版本
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            // 输入验证
            if (!username || !password) {
                errorMsg.textContent = '请输入用户名和密码';
                errorMsg.style.display = 'block';
                return;
            }

            // 清除之前的错误信息
            errorMsg.style.display = 'none';
            loading.classList.add('active');

            try {
                // 使用async/await简化异步代码
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    }),
                    // 添加超时控制
                    signal: AbortSignal.timeout(10000)
                });

                if (response.ok) {
                    // 登录成功，等待一下再重定向，确保cookie已设置
                    const data = await response.json();

                    // 延迟200ms确保认证信息已保存
                    setTimeout(() => {
                        // 重定向到filebrowser主页
                        // 使用 window.location.replace 避免返回登录页
                        window.location.replace('/filebrowser/');
                    }, 200);
                } else if (response.status === 401 || response.status === 403) {
                    throw new Error('用户名或密码错误');
                } else {
                    throw new Error(`登录失败 (${response.status})，请重试`);
                }
            } catch (error) {
                loading.classList.remove('active');

                // 更详细的错误处理
                if (error.name === 'AbortError') {
                    errorMsg.textContent = '请求超时，请检查网络连接';
                } else if (error instanceof TypeError) {
                    errorMsg.textContent = '网络错误，请检查连接';
                } else {
                    errorMsg.textContent = error.message || '登录失败，请重试';
                }

                errorMsg.style.display = 'block';
                console.error('Login error:', error);
            }
        });

        // 性能监控（可选）
        if ('PerformanceObserver' in window) {
            try {
                const observer = new PerformanceObserver((list) => {
                    for (const entry of list.getEntries()) {
                        console.log(`${entry.name}: ${entry.duration}ms`);
                    }
                });
                observer.observe({ entryTypes: ['navigation', 'resource'] });
            } catch (e) {
                // 浏览器不支持，忽略
            }
        }
    </script>
</body>
</html>
