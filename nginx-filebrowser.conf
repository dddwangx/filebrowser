# 上游服务器配置
upstream filebrowser_backend {
    server filebrowser:80;
    keepalive 32;
}

# 缓存配置
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=filebrowser_cache:10m max_size=100m inactive=60m use_temp_path=off;

server {
    listen 80;
    server_name localhost;

    # 启用gzip压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # 自定义登录页面 - 新路由
    location = /filebrowser-customer {
        root /var/www/filebrowser;
        try_files /custom-login.html =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        add_header X-Content-Type-Options "nosniff";
    }

    # 自定义登录页面的静态资源
    location /filebrowser-customer/ {
        alias /var/www/filebrowser/;
        try_files $uri $uri/ =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Logo图片 - 长期缓存
    location /logos/ {
        root /var/www/filebrowser;
        expires 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";
        access_log off;
    }

    # 代理到Filebrowser原版 - 带缓存
    # 注意：不使用 location /filebrowser 以避免重定向循环
    location ~ ^/filebrowser(/.*)?$ {
        proxy_pass http://filebrowser_backend/filebrowser$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /filebrowser;
        proxy_set_header Connection "";

        # 连接优化
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        # 缓冲优化
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # 禁用重定向缓存
        proxy_redirect off;
    }

    # API请求 - 不缓存
    # 代理到后端，保留完整路径
    location /api/ {
        proxy_pass http://filebrowser_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # 连接优化
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        # 禁用缓存
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        # 禁用重定向缓存
        proxy_redirect off;
    }

    # 根路径重定向到自定义登录页
    location = / {
        return 301 /filebrowser-customer;
    }
}
